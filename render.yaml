# Render Blueprint — FastAPI backend as a Docker web service.
# Frontend stays on Vercel; only the API runs here.
#
# Free plan sleeps after ~15 min idle (30-60s cold start). That is safe for the
# batch worker (state is persisted in Supabase; reset_orphaned on boot +
# reset_stale_generating on each enqueue reclaim any rows stranded by a sleep) but
# NOT for video jobs (in-memory only — a sleep mid-render loses the job). Keep the
# tab open during a VEO render so poll traffic keeps the instance awake.
#
# Secrets are `sync: false` — Render prompts for them on first deploy; nothing
# sensitive is committed. FRONTEND_ORIGINS must list the Vercel origin so CORS
# allows the browser frontend.
services:
  - type: web
    name: mockupgen-backend
    runtime: docker
    plan: free
    dockerfilePath: ./Dockerfile
    healthCheckPath: /api/health
    envVars:
      - key: SUPABASE_PROJECT_ID
        sync: false
      - key: SUPABASE_PUBLISHABLE_KEY
        sync: false
      - key: SUPABASE_SECRET_KEY
        sync: false
      - key: GOOGLE_API_KEY
        sync: false
      - key: FRONTEND_ORIGINS
        sync: false
      # Google Drive read/write (product folders, backfill). Service-account key
      # as inline JSON — NOT a file path (no persistent FS on Render). Paste the
      # contents of the local drive-sa.json. Also serves Vertex auth via the
      # GOOGLE_VERTEX_SA_JSON fallback in config.py, so one key covers both.
      - key: GOOGLE_DRIVE_SA_JSON
        sync: false
      # Route Gemini image + VEO video through Vertex AI (Cloud billing), matching
      # local. Without this, generation falls back to the AI Studio key path.
      - key: GOOGLE_GENAI_USE_VERTEXAI
        value: "true"
      - key: GOOGLE_CLOUD_PROJECT
        value: bindalscreation
      - key: GOOGLE_CLOUD_LOCATION
        value: global
      # Image model + per-model batch pools, matching local. Default is the pro
      # model + a single pool, so both must be set explicitly to match prod.
      - key: GEMINI_IMAGE_MODEL
        value: gemini-3.1-flash-image
      - key: BATCH_MODEL_CONCURRENCY
        value: gemini-3.1-flash-image=3,gemini-3-pro-image=3
