# Render Blueprint — FastAPI backend as a Docker web service.
# Frontend stays on Vercel; only the API runs here.
#
# Free plan sleeps after ~15 min idle (30-60s cold start). That is safe for the
# batch worker (state is persisted in Supabase; reset_orphaned on boot +
# reset_stale_generating on each enqueue reclaim any rows stranded by a sleep) but
# NOT for video jobs (in-memory only — a sleep mid-render loses the job). Keep the
# tab open during a VEO render so poll traffic keeps the instance awake.
#
# Secrets are `sync: false` — Render prompts for them on first deploy; nothing
# sensitive is committed. FRONTEND_ORIGINS must list the Vercel origin so CORS
# allows the browser frontend.
services:
  - type: web
    name: mockupgen-backend
    runtime: docker
    plan: free
    dockerfilePath: ./Dockerfile
    healthCheckPath: /api/health
    envVars:
      - key: SUPABASE_PROJECT_ID
        sync: false
      - key: SUPABASE_PUBLISHABLE_KEY
        sync: false
      - key: SUPABASE_SECRET_KEY
        sync: false
      - key: GOOGLE_API_KEY
        sync: false
      - key: FRONTEND_ORIGINS
        sync: false
