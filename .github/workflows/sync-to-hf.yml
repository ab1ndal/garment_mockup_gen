name: Sync to Hugging Face Space

on:
  push:
    branches: [main]
  workflow_dispatch:

# Prevent overlapping syncs from racing each other
concurrency:
  group: sync-to-hf
  cancel-in-progress: true

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout full history
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          lfs: true

      - name: Push to Hugging Face Space
        env:
          HF_TOKEN: ${{ secrets.HF_TOKEN }}
        run: |
          git push --force \
            "https://abindal95:${HF_TOKEN}@huggingface.co/spaces/abindal95/MockupGen" \
            HEAD:main
